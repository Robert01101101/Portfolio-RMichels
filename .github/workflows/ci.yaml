name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, feat/astro-migration]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export content (if scripts present)
        run: |
          node scripts/export-db-to-content.mjs || true
          node scripts/po-to-json.mjs || true

      - name: Astro check
        run: npm run check

      - name: Build
        run: npm run build
