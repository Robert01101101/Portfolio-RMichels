name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, feat/astro-migration]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync assets to public/
        run: cp -r assets public/assets

      - name: Export content (migration helper)
        run: |
          node scripts/export-db-to-content.mjs || echo "Export skipped — using committed content"
          node scripts/po-to-json.mjs || echo "i18n export skipped — using committed JSON"

      - name: Astro check
        run: npm run check

      - name: Unit tests
        run: npm run test:unit

      - name: Content validation
        run: npm run test:content

      - name: Build
        run: npm run build

      - name: Verify build output
        run: npm run test:verify
